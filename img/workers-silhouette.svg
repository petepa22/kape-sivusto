<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="#2d6432" opacity="0.3">
  <!-- Worker 1: with hard hat, holding hammer -->
  <g transform="translate(10,0)">
    <!-- Hard hat -->
    <ellipse cx="18" cy="8" rx="8" ry="4"/>
    <rect x="10" y="7" width="16" height="3" rx="1"/>
    <!-- Head -->
    <circle cx="18" cy="14" r="5"/>
    <!-- Body -->
    <rect x="14" y="19" width="8" height="16" rx="2"/>
    <!-- Left arm (holding hammer) -->
    <line x1="14" y1="22" x2="4" y2="30" stroke="#2d6432" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
    <!-- Hammer -->
    <rect x="0" y="27" width="6" height="3" rx="1"/>
    <!-- Right arm -->
    <line x1="22" y1="22" x2="28" y2="32" stroke="#2d6432" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
    <!-- Legs -->
    <line x1="16" y1="35" x2="12" y2="52" stroke="#2d6432" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <line x1="20" y1="35" x2="24" y2="52" stroke="#2d6432" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <!-- Boots -->
    <rect x="9" y="50" width="7" height="3" rx="1"/>
    <rect x="21" y="50" width="7" height="3" rx="1"/>
  </g>

  <!-- Worker 2: carrying plank -->
  <g transform="translate(55,0)">
    <!-- Hard hat -->
    <ellipse cx="18" cy="8" rx="8" ry="4"/>
    <rect x="10" y="7" width="16" height="3" rx="1"/>
    <!-- Head -->
    <circle cx="18" cy="14" r="5"/>
    <!-- Body -->
    <rect x="14" y="19" width="8" height="16" rx="2"/>
    <!-- Arms up holding plank -->
    <line x1="14" y1="22" x2="6" y2="16" stroke="#2d6432" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
    <line x1="22" y1="22" x2="30" y2="16" stroke="#2d6432" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
    <!-- Plank -->
    <rect x="0" y="13" width="36" height="3" rx="1" opacity="0.25"/>
    <!-- Legs (walking) -->
    <line x1="16" y1="35" x2="10" y2="52" stroke="#2d6432" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <line x1="20" y1="35" x2="26" y2="52" stroke="#2d6432" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <!-- Boots -->
    <rect x="7" y="50" width="7" height="3" rx="1"/>
    <rect x="23" y="50" width="7" height="3" rx="1"/>
  </g>

  <!-- Worker 3: with clipboard -->
  <g transform="translate(110,0)">
    <!-- Hard hat -->
    <ellipse cx="18" cy="8" rx="8" ry="4"/>
    <rect x="10" y="7" width="16" height="3" rx="1"/>
    <!-- Head -->
    <circle cx="18" cy="14" r="5"/>
    <!-- Body -->
    <rect x="14" y="19" width="8" height="16" rx="2"/>
    <!-- Left arm holding clipboard -->
    <line x1="14" y1="22" x2="8" y2="30" stroke="#2d6432" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
    <!-- Clipboard -->
    <rect x="3" y="26" width="8" height="10" rx="1" opacity="0.25"/>
    <!-- Right arm pointing -->
    <line x1="22" y1="22" x2="32" y2="20" stroke="#2d6432" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
    <!-- Legs -->
    <line x1="16" y1="35" x2="14" y2="52" stroke="#2d6432" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <line x1="20" y1="35" x2="22" y2="52" stroke="#2d6432" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <!-- Boots -->
    <rect x="11" y="50" width="7" height="3" rx="1"/>
    <rect x="19" y="50" width="7" height="3" rx="1"/>
  </g>
</svg>
